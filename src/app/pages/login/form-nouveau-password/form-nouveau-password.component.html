<div class="row m-sm-0">
  <div class="col-lg-12 card-profile">
    <div class="card card-block card-stretch card-height">
      <div class="card-body">
        <div class="col-lg-12">
          <div class="card">
            <h2>Réinitialiser votre mot de passe</h2>
            <!-- Formulaire réactif -->
            <form [formGroup]="form" (ngSubmit)="onSubmit()">
              <!-- Nouveau mot de passe -->
              <label>Nouveau mot de passe :</label>
              <div class="input-group">
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  class="form-control"
                  formControlName="nouveauPassword"
                  placeholder="Entrer le nouveau mot de passe"
                />
                <span
                  class="input-group-text"
                  (click)="showPassword = !showPassword"
                  style="cursor: pointer"
                >
                  <i
                    class="mdi"
                    [ngClass]="
                      showPassword ? 'mdi-eye-off-outline' : 'mdi-eye-outline'
                    "
                  ></i>
                </span>
              </div>
              <!-- Erreurs spécifiques -->
              <div
                *ngIf="
                  form.get('nouveauPassword')?.hasError('required') &&
                  form.get('nouveauPassword')?.touched
                "
                class="text-danger"
              >
                Le mot de passe est obligatoire.
              </div>
              <div
                *ngIf="
                  form.get('nouveauPassword')?.hasError('minlength') &&
                  form.get('nouveauPassword')?.touched
                "
                class="text-danger"
              >
                Le mot de passe doit contenir au moins 6 caractères.
              </div>
              <!-- Confirmer le mot de passe -->
              <label>Confirmer le mot de passe :</label>
              <div class="input-group">
                <input
                  [type]="showConfirmPassword ? 'text' : 'password'"
                  class="form-control"
                  formControlName="confirmerPassword"
                  placeholder="Confirmer le mot de passe"
                />
                <span
                  class="input-group-text"
                  (click)="showConfirmPassword = !showConfirmPassword"
                  style="cursor: pointer"
                >
                  <i
                    class="mdi"
                    [ngClass]="
                      showConfirmPassword
                        ? 'mdi-eye-off-outline'
                        : 'mdi-eye-outline'
                    "
                  ></i>
                </span>
              </div>
              <!-- Erreurs spécifiques -->
              <div
                *ngIf="
                  form.get('confirmerPassword')?.hasError('required') &&
                  form.get('confirmerPassword')?.touched
                "
                class="text-danger"
              >
                La confirmation est obligatoire.
              </div>
              <div
                *ngIf="
                  form.get('confirmerPassword')?.hasError('mismatch') &&
                  form.get('confirmerPassword')?.touched
                "
                class="text-danger"
              >
                Les mots de passe ne correspondent pas.
              </div>
              <!-- Messages globaux (API, succès, etc.) -->
              <div
                *ngIf="message"
                [ngClass]="{ 'text-success': success, 'text-danger': !success }"
              >
                {{ message }}
              </div>
              <button type="submit" class="btn save" [disabled]="loading">
                {{ loading ? "Validation en cours..." : "Valider" }}
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
