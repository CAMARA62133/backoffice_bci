<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg" style="max-width: 400px; width: 100%">
    <div class="card-body">
      <h5>Réinitialiser votre mot de passe</h5>

      <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
        <!-- Nouveau mot de passe -->
        <div class="mb-3">
          <label for="newPassword" class="form-label">
            Nouveau mot de passe
          </label>
          <div class="input-group">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="newPassword"
              formControlName="newPassword"
              class="form-control"
              placeholder="Entrez le nouveau mot de passe"
              [class.is-invalid]="isInvalid('newPassword')"
              [class.is-valid]="isValid('newPassword')"
            />
            <button
              type="button"
              class="btn btn-primary"
              (click)="showPassword = !showPassword"
            >
              <i
                class="mdi"
                [ngClass]="
                  showPassword ? 'mdi-eye-off-outline' : 'mdi-eye-outline'
                "
              ></i>
            </button>
            <div *ngIf="isInvalid('newPassword')" class="invalid-feedback">
              {{ getErrorMessage("newPassword") }}
            </div>
            <div *ngIf="isValid('newPassword')" class="valid-feedback">
              Mot de passe valide ✅
            </div>
          </div>
        </div>

        <!-- Confirmation -->
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">
            Confirmer le mot de passe
          </label>
          <div class="input-group">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              id="confirmPassword"
              formControlName="confirmPassword"
              class="form-control"
              placeholder="Confirmez le mot de passe"
              [class.is-invalid]="
                isInvalid('confirmPassword') ||
                resetPasswordForm.hasError('passwordMismatch')
              "
              [class.is-valid]="
                isValid('confirmPassword') &&
                !resetPasswordForm.hasError('passwordMismatch')
              "
            />
            <button
              type="button"
              class="btn btn-primary"
              (click)="showConfirmPassword = !showConfirmPassword"
            >
              <i
                class="mdi"
                [ngClass]="
                  showConfirmPassword
                    ? 'mdi-eye-off-outline'
                    : 'mdi-eye-outline'
                "
              ></i>
            </button>
            <div
              *ngIf="
                isInvalid('confirmPassword') ||
                resetPasswordForm.hasError('passwordMismatch')
              "
              class="invalid-feedback"
            >
              {{ getErrorMessage("confirmPassword") }}
            </div>
            <div
              *ngIf="
                isValid('confirmPassword') &&
                !resetPasswordForm.hasError('passwordMismatch')
              "
              class="valid-feedback"
            >
              Les mots de passe correspondent ✅
            </div>
          </div>
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100 mt-3"
          [disabled]="loading"
        >
          {{ loading ? "Validation en cours..." : "Valider" }}
        </button>
      </form>
    </div>
  </div>
</div>
