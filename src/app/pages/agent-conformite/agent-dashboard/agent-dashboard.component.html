<div class="page-content">
  <div class="container-fluid border-bottom">
    <div class="row mt-3">
      <div class="col-12">
        <div
          class="d-sm-flex justify-content-between align-items-center mt-4 page-title-box"
        >
          <div>
            <h4 class="fw-semibold text-primary mb-sm-0 h3">Tableau de bord</h4>
            <!--            <p class="text-secondary mb-sm-0 font-size-13">Gérez et prenez en charge toutes les requêtes, tickets de-->
            <!--              support, blocages ou demandes administratives émis par les entreprises clientes.</p>-->
          </div>
          <!--          <div class="page-title-right">-->
          <!--            <ol class="breadcrumb m-0">-->
          <!--              <li class="breadcrumb-item"><a><span>Entreprises Clientes</span></a></li>-->
          <!--              <li class="breadcrumb-item"><a href="#"><span>Workflows &amp; validations</span></a></li>-->
          <!--            </ol><span class="badge bg-success ms-2">🟢 Tous les services opérationnels</span>-->
          <!--          </div>-->
        </div>
      </div>
    </div>
  </div>

  <div class="container-fluid mt-4">
    <div class="row mb-4">
      <div class="col-md-6 col-lg-3 mb-3">
        <div class="card text-white bg-primary border-0 stat-card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <p class="fw-semibold mb-0 card-title">Total des demandes</p>
                <h3 class="text-white metric-number" id="ticketsOuverts">45</h3>
              </div>
              <div class="stat-icon">
                <i class="fas fa-ticket-alt fa-3x opacity-50"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-lg-3 mb-3">
        <div class="card text-white bg-success border-0 stat-card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <p class="fw-semibold mb-0 card-title">Demande Traités</p>
                <h3 id="ticketsEnCours" class="metric-number text-white">28</h3>
              </div>
              <div class="stat-icon">
                <i class="fas fa-clock fa-3x opacity-50"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-lg-3 mb-3">
        <div class="card text-white bg-warning border-0 stat-card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <p class="fw-semibold mb-0 card-title">En Attentes</p>
                <h3 class="metric-number" id="ticketsResolus24h2">67</h3>
              </div>
              <div class="stat-icon">
                <i class="fas fa-check-circle fa-3x opacity-50"></i>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6 col-lg-3 mb-3">
        <div class="card text-white bg-danger border-0 stat-card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <p class="fw-semibold mb-0 card-title">Damandes Réjété</p>
                <h3 id="satisfactionMoyenne" class="metric-number text-white">
                  4.2
                </h3>
              </div>
              <div class="stat-icon">
                <i class="fas fa-star fa-3x opacity-50"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="card">
          <div class="card-body border-2 border-primary">
            <div class="chart-container">
              <apx-chart
                [title]="chart1.title"
                [series]="chart1.series"
                [labels]="chart1.labels"
                [chart]="chart1.chart"
                [xaxis]="chart1.xaxis"
                [dataLabels]="chart1.dataLabels"
                [plotOptions]="chart1.plotOptions"
                [fill]="chart1.fill"
                [tooltip]="chart1.tooltip"
              ></apx-chart>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card">
          <div class="card-body border-2 border-primary">
            <div class="chart-container">
              <apx-chart
                [title]="chart2.title"
                [series]="chart2.series"
                [labels]="chart2.labels"
                [chart]="chart2.chart"
                [xaxis]="chart2.xaxis"
                [dataLabels]="chart2.dataLabels"
                [plotOptions]="chart2.plotOptions"
                [fill]="chart2.fill"
                [tooltip]="chart2.tooltip"
              ></apx-chart>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card">
          <div class="card-body border-2 border-primary">
            <div class="chart-container">
              <apx-chart
                [title]="chart3.title"
                [series]="chart3.series"
                [chart]="chart3.chart"
                [xaxis]="chart3.xaxis"
                [dataLabels]="chart3.dataLabels"
                [plotOptions]="chart3.plotOptions"
                [fill]="chart3.fill"
                [tooltip]="chart3.tooltip"
              ></apx-chart>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card">
          <div class="card-body border-2 border-primary">
            <div class="chart-container">
              <apx-chart [series]="chart4.series"></apx-chart>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
