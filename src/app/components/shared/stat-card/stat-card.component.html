<div class="col-md-6 col-lg-3 mb-3">
  <div class="card text-white border-0 stat-card" [ngClass]="'bg-' + bgColor">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <p class="fw-semibold mb-0 card-title">{{ title }}</p>
          <h3 class="text-white metric-number" id="ticketsOuverts">{{ value }}</h3>
        </div>
        <div class="stat-icon"><i [class]="icon + ' fa-3x opacity-50'"></i></div>
      </div>
      <div class="align-content-end metric-change">
        <i [class]="changeIcon + ' ' + changeColor"></i>
        <span class="text-light">{{ change }}</span>
      </div>
    </div>
  </div>
</div>
